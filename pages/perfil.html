<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Meu Perfil | Fundação Comics</title>

    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

    <!-- Header -->
    <div id="header"></div>

    <!-- Modal de Login -->
    <div id="auth"></div>

    <!-- Conteúdo da página -->
    <main class="perfil-page">

        <div class="container">

            <h1 class="page-title">Meu Perfil</h1>

            <div class="perfil-card">

                <div class="perfil-avatar">

                    <button
                        id="btnTrocarAvatar"
                        class="avatar-button"
                        type="button"
                        aria-label="Trocar avatar">

                        <img
                            id="perfilAvatar"
                            src="../img/avatar.jpg"
                            alt="Avatar">

                    </button>

                </div>

                <div class="perfil-info">

                    <h2 id="perfilNome">Carregando...</h2>

                    <p id="perfilEmail"></p>

                    <p id="perfilData"></p>

                    <div class="perfil-actions">

                        <button id="btnEditarPerfil">
                            Editar Perfil
                        </button>

                        <button id="btnTrocarAvatarTexto">
                            Trocar Avatar
                        </button>

                    </div>

                </div>

            </div>

            <section class="perfil-stats">

                <div class="stat-card">

                    <a href="favoritos.html" class="stat-link">

                        <span class="stat-icon">⭐</span>

                        <h3 id="totalFavoritos">0</h3>

                        <p>Favoritos</p>

                    </a>

                </div>

                <a href="biblioteca.html" class="stat-card">

                    <span class="stat-icon">📚</span>

                    <h3 id="totalBiblioteca">0</h3>

                    <p>Minha Biblioteca</p>

                </a>

                <div class="stat-card">

                    <span class="stat-icon">⬇️</span>

                    <h3 id="totalBaixadas">0</h3>

                    <p>HQs Baixadas</p>

                </div>

            </section>



            <section class="perfil-history">

                <h2>Atividade Recente</h2>

                <div class="history-card">

                    <div id="listaAtividades">

                        <p>Nenhuma atividade registrada ainda.</p>

                    </div>

                </div>

            </section>

        </div>

    </main>

    <!-- Footer -->
    <div id="footer"></div>

    <!-- ===========================
         MODAL TROCAR AVATAR
    ============================ -->

    <!-- ===========================
MODAL TROCAR AVATAR
=========================== -->

        <div id="avatarModal" class="modal-overlay">

            <div class="modal">

                <h2>Trocar Avatar</h2>

        <p>Escolha um avatar para seu perfil.</p>

        <div id="listaAvatares" class="avatar-grid">

        </div>

        <div class="modal-botoes">

    <button id="salvarAvatar">
        Salvar Avatar
    </button>

    <button id="fecharAvatarModal">
        Fechar
    </button>

</div>

            </div>

        </div>

    <!-- ===========================
         MODAL EDITAR PERFIL
    ============================ -->

    <div id="editarPerfilModal" class="modal-overlay">

        <div class="modal">

            <h2>Editar Perfil</h2>

            <label>Nome</label>

            <input
                type="text"
                id="editarNome"
                maxlength="15"
                required>

            <div class="modal-botoes">

                <button id="salvarPerfil">
                    Salvar
                </button>

                <button id="cancelarPerfil">
                    Cancelar
                </button>

            </div>

        </div>

    </div>

    <script defer src="../js/auth.js"></script>
    <script defer src="../js/favoritos.js"></script>
    
    <script defer src="../js/auth-ui.js"></script>
    <script defer src="../js/components.js"></script>
    <script defer src="../js/perfil.js"></script>
    <script defer src="../js/busca.js"></script>
    <script defer src="../js/mobile-menu.js"></script>

</body>

</html>
