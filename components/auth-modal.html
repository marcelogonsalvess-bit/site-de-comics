<div class="auth-overlay" id="authOverlay">

    <div class="auth-box">

        <button class="close-auth" id="closeAuth">
            ✕
        </button>


        <div id="loginForm">

            <h2>Entrar</h2>

            <input 
            type="email" 
            id="loginEmail"
            placeholder="E-mail">


            <input 
            type="password" 
            id="loginPassword"
            placeholder="Senha">


            <button type="button" id="loginButton">
                Entrar
            </button>


            <p>
                Não tem conta?
                <span id="switchRegister">
                    Cadastre-se
                </span>
            </p>

        </div>



        <div id="registerForm" style="display:none">

            <h2>Cadastrar</h2>


            <input 
            type="text" 
            id="registerName"
            placeholder="Nome">


            <input 
            type="email" 
            id="registerEmail"
            placeholder="E-mail">


            <input 
            type="password"
            id="registerPassword"
            placeholder="Senha">


            <button type="button" id="registerButton">
                Criar conta
            </button>


            <p>
                Já possui conta?
                <span id="switchLogin">
                    Entrar
                </span>
            </p>


        </div>


    </div>

</div>
